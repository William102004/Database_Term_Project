<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="../Styles/Styles.css">
</head>
<style>
  body {
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }

  .Forgot-container {
    border-radius: 12px;
    background: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 36px;
    gap: 14px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
  }

  .Forgot-container input{
          width: 100%;
            padding: 12px;
            background: transparent;
            border: 1.5px solid #050307;
            border-radius: 12px;
            color: #000000;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
  }
  .Reset-button{
            width: 70%;
            padding: 12px;
            background: transparent;
            border: 1.5px solid #050307;
            border-radius: 12px;
            color: #000000;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
  }

</style>
<body>
<div class="Forgot-container">
    <h1>Reset Password</h1>
    <input type="text" id="LoginName" placeholder="LoginName" required>
    <input type="password" id="NewPassword" placeholder="New Password" required>
    <button class="Reset-button" onclick="ForgotPassword()">Reset Password</button>
    

    <script src="../Scripts/LoginPage.js"></script>
</div>
</body>
</html>
