<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="../Styles/Styles.css">
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }

  .login-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
</style>
</head>
<body>
<div class="login-container">
  <h1>Expense Tracker</h1>
  <h2>Login</h2>
  <input type="text" id="LoginName" placeholder="Login Name" required>
  <input type="password" id="LoginPassword" placeholder="Login Password" required>
  <button onclick="login()">Login</button>
  <button onclick="window.location.href='RegisterPage.html'">Register</button>
  <button onclick="window.location.href='ForgotPassword.html'">Forgot Password</button>
</div>
<script src="../Scripts/LoginPage.js"></script>
</body>
</html>
