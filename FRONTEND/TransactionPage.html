<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Details</title>
    <link rel="stylesheet" href="../Styles/Styles.css">
</head>
<body>
    <div class="page-container">

        <!-- User Bar -->
        <div class="user-bar">
            <div class="user-wrapper">
                <div class="user-circle" onclick="toggleUserMenu()" id="user-circle"></div>
                <span class="user-name" id="user-name-display"></span>
                <div class="dropdown-menu" id="user-menu" style="display:none;">
                    <button onclick="openChangeNameModel()">Change Name</button>
                    <button onclick="openChangePasswordModel()">Change Password</button>
                    <button class="delete-btn" onclick="deleteUser()">Delete User</button>
                    <button onclick="Logout()">Logout</button>
                </div>
            </div>
        </div>

        <!-- Transaction Details -->
        <div class="account-content">
            <button class="btn-secondary" onclick="goBack()">← Back to Account</button>
            
            <h2>Transaction Details</h2>

            <div class="transaction-details-container">
                <div class="detail-box">
                    <label>Transaction Name:</label>
                    <p id="detail-name">--</p>
                </div>

                <div class="detail-box">
                    <label>Amount:</label>
                    <p id="detail-amount">--</p>
                </div>

                <div class="detail-box">
                    <label>Category:</label>
                    <p id="detail-category">--</p>
                </div>

                <div class="detail-box">
                    <label>Date:</label>
                    <p id="detail-date">--</p>
                </div>

            </div>

            <div class="transaction-actions">
                <button class="btn-primary" onclick="openEditTransactionModal()">Edit</button>
                <button class="btn-danger" onclick="deleteTransactionFromDetail()">Delete</button>
            </div>
        </div>

    </div>

    <!-- Edit Transaction Model -->
    <div id="edit-transaction-model" class="model" style="display:none;">
        <div class="model-box">
            <h3>Edit Transaction</h3>
            <input type="hidden" id="edit-transaction-number">
            <input type="text"   id="edit-transaction-name"   placeholder="Name">
            <input type="number" id="edit-transaction-amount" placeholder="Amount" step="0.01">
            <select id="edit-transaction-category-options">
                <option value="Food">Food</option>
                <option value="Transportation">Transportation</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Utilities">Utilities</option>
                <option value="Groceries">Groceries</option>
            </select>
            <input type="date" id="edit-transaction-date">
            <div class="model-buttons">
                <button class="btn-primary" onclick="saveEditTransaction()">Save</button>
                <button onclick="closeAllModels()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="../Scripts/Models.js"></script>
    <script src="../Scripts/TransactionPage.js"></script>

</body>
</html>
