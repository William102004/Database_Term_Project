<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detailed Analysis</title>
    <link rel="stylesheet" href="../Styles/Styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="page-container">

        <!-- User Bar -->
        <div class="user-bar">
            <div class="user-wrapper">
                <div class="user-circle" onclick="toggleUserMenu()" id="user-circle"></div>
                <span class="user-name" id="user-name-display"></span>
                <div class="dropdown-menu" id="user-menu" style="display:none;">
                    <button onclick="openChangeNameModel()">Change Name</button>
                    <button onclick="openChangePasswordModel()">Change Password</button>
                    <button class="delete-btn" onclick="deleteUser()">Delete User</button>
                    <button onclick="Logout()">Logout</button>
                </div>
            </div>
        </div>

        <div class="account-content">
            <button class="btn-secondary" onclick="goBack()">← Back to Account</button>
            <h2>Detailed Spending Analysis</h2>

            <!-- Monthly Spending Chart -->
            <h3>Monthly Spending by Category</h3>
            <div style="background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px;">
                <canvas id="spending-chart"></canvas>
            </div>

            <!-- All-time Category Summary -->
            <h3>All-Time Spending by Category</h3>
            <table class="transactions-table">
                <thead>
                    <tr>
                        <th>Category</th>
                        <th>Total Spent</th>
                        <th>Total Transactions</th>
                    </tr>
                </thead>
                <tbody id="category-summary-tbody"></tbody>
            </table>
        </div>

    </div>

    <!-- Change Name Model -->
    <div id="change-name-model" class="model" style="display:none;">
        <div class="model-box">
            <h3>Change Name</h3>
            <input type="text" id="new-user-name" placeholder="New Name">
            <div class="model-buttons">
                <button class="btn-primary" onclick="changeName()">Save</button>
                <button onclick="closeAllModels()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Change Password Model -->
    <div id="change-password-model" class="model" style="display:none;">
        <div class="model-box">
            <h3>Change Password</h3>
            <input type="password" id="new-password" placeholder="New Password">
            <div class="model-buttons">
                <button class="btn-primary" onclick="changePassword()">Save</button>
                <button onclick="closeAllModels()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="../Scripts/Models.js"></script>
    <script src="../Scripts/AdvancedFeature.js"></script>
</body>
</html>
