<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spending Risk Analysis</title>
    <link rel="stylesheet" href="../Styles/Styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="page-container">

        <!-- User Bar -->
        <div class="user-bar">
            <div class="user-wrapper">
                <div class="user-circle" onclick="toggleUserMenu()" id="user-circle"></div>
                <span class="user-name" id="user-name-display"></span>
                <div class="dropdown-menu" id="user-menu" style="display:none;">
                    <button onclick="openChangeNameModel()">Change Name</button>
                    <button onclick="openChangePasswordModel()">Change Password</button>
                    <button class="delete-btn" onclick="deleteUser()">Delete User</button>
                    <button onclick="Logout()">Logout</button>
                </div>
            </div>
        </div>

        <div class="account-content">
            <button class="btn-secondary" onclick="goBack()">← Back to Account</button>
            <h2>Spending Risk Analysis</h2>
            <p id="period-label" style="color:#7f8c8d; margin-top:4px; margin-bottom:20px;"></p>

            <!-- Risk Summary Cards -->
            <div style="display:flex; gap:16px; margin-bottom:24px; flex-wrap:wrap;">
                <div style="flex:1; min-width:140px; background:#fdecea; border-left:4px solid #e74c3c; border-radius:8px; padding:16px;">
                    <div style="font-size:2rem; font-weight:bold; color:#e74c3c;" id="count-high">0</div>
                    <div style="color:#c0392b; font-weight:bold; font-size:0.95rem;">High Risk</div>
                </div>
                <div style="flex:1; min-width:140px; background:#fef9e7; border-left:4px solid #f39c12; border-radius:8px; padding:16px;">
                    <div style="font-size:2rem; font-weight:bold; color:#f39c12;" id="count-medium">0</div>
                    <div style="color:#d68910; font-weight:bold; font-size:0.95rem;">Medium Risk</div>
                </div>
                <div style="flex:1; min-width:140px; background:#eafaf1; border-left:4px solid #27ae60; border-radius:8px; padding:16px;">
                    <div style="font-size:2rem; font-weight:bold; color:#27ae60;" id="count-low">0</div>
                    <div style="color:#1e8449; font-weight:bold; font-size:0.95rem;">Low Risk</div>
                </div>
            </div>

            <!-- Previous vs Current Month Chart -->
            <div id="chart-section" style="background:white; border-radius:10px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.06); margin-bottom:24px;">
                <h3 style="margin-top:0; color:#2c3e50;">Previous vs Current Month by Category</h3>
                <canvas id="trend-chart"></canvas>
            </div>

            <!-- Category Risk Breakdown Table -->
            <h3 style="color:#2c3e50;">Category Risk Breakdown</h3>
            <table class="transactions-table">
                <thead>
                    <tr>
                        <th>Category</th>
                        <th>This Month</th>
                        <th>Last Month</th>
                        <th>Change</th>
                        <th>Budget Used</th>
                        <th>Risk Level</th>
                        <th>Feedback</th>
                    </tr>
                </thead>
                <tbody id="analysis-tbody"></tbody>
            </table>
        </div>

    </div>

    <!-- Change Name Model -->
    <div id="change-name-model" class="model" style="display:none;">
        <div class="model-box">
            <h3>Change Name</h3>
            <input type="text" id="new-user-name" placeholder="New Name">
            <div class="model-buttons">
                <button class="btn-primary" onclick="changeName()">Save</button>
                <button onclick="closeAllModels()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Change Password Model -->
    <div id="change-password-model" class="model" style="display:none;">
        <div class="model-box">
            <h3>Change Password</h3>
            <input type="password" id="new-password" placeholder="New Password">
            <div class="model-buttons">
                <button class="btn-primary" onclick="changePassword()">Save</button>
                <button onclick="closeAllModels()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="../Scripts/Models.js"></script>
    <script src="../Scripts/AdvancedFeature.js"></script>
</body>
</html>
