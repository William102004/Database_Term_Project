<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account</title>
    <link rel="stylesheet" href="../Styles/Styles.css">
</head>
<body>
    <div class="page-container">

        <!-- User Bar -->
        <div class="user-bar">
            <div class="user-wrapper">
                <div class="user-circle" onclick="toggleUserMenu()" id="user-circle"></div>
                <span class="user-name" id="user-name-display"></span>
                <div class="dropdown-menu" id="user-menu" style="display:none;">
                    <button onclick="openChangeNameModel()">Change Name</button>
                    <button onclick="openChangePasswordModel()">Change Password</button>
                    <button class="delete-btn" onclick="deleteUser()">Delete User</button>
                </div>
                <button onclick="SpendingVsBudget()">Budget vs Spending Analysis</button>
                <button onclick="MonthlySpending()">Monthly Spending Data</button>
                <button onclick="AdvancedFeature()">Detailed Analysis</button>
            </div>
        </div>

        <!-- Account Content -->
        <div class="account-content">
            <h2 id="account-name">Account Name</h2>
            <p id="account-balance">Balance:</p>

            <!-- Transactions -->
             <h3>Transactions  <button class="btn-primary" onclick="openAddTransactionModel()">Add Transaction</button></h3>
            <!-- Filters -->
            <div class="filters">
                <input type="text"   id="filter-name"  placeholder="Search by name">
                <select id="filter-category">
                     <option value="">-- All Categories --</option>
                     <option value="Food">Food</option>
                    <option value="Transportation">Transportation</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Utilities">Utilities</option>
                    <option value="Groceries">Groceries</option>
                </select>
                <input type="number" id="filter-amount-min" placeholder="Min Amount" step="0.01">
                <input type="number" id="filter-amount-max" placeholder="Max Amount" step="0.01">
                <input type="date"   id="filter-date-from">
                <input type="date"   id="filter-date-to">
                <button class="btn-primary" onclick="loadTransactions()">Apply</button>
                <button onclick="clearFilters()">Clear</button>
            </div>
            <!-- Transactions Table -->
            <table class="transactions-table">
                <thead>
                    <tr>
                     <th>Name</th>
                     <th>Amount</th>
                     <th>Category</th>
                     <th>Date</th>
                     <th></th>
                    </tr>
                </thead>
                <tbody id="transactions-tbody"></tbody>
            </table>
        </div>
            <!-- Budget Table -->
             <h4>Budgets <button class="btn-primary" onclick="openAddBudgetModel()">Add Budget</button></h4>
            <table class="budget-table">
                <thead>
                    <tr>
                        <th>Category</th>
                        <th>Threshold</th>
                        <th>Frequency</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="budget-tbody"></tbody>
            </table>

        </div> 

    </div> 

    <!-- Add Transaction Model  -->
    <div id="add-transaction-model" class="model" style="display:none;">
        <div class="model-box">
            <h3>Add Transaction</h3>
            <input type="text"   id="add-transaction-name"   placeholder="Name">
            <input type="number" id="add-transaction-amount" placeholder="Amount" step="0.01">
            <select id="add-transaction-category-options">
                <option value="">-- Category --</option>
                <option value="Food">Food</option>
                <option value="Transportation">Transportation</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Utilities">Utilities</option>
                <option value="Groceries">Groceries</option>
            </select>
            <input type="date" id="add-transaction-date">
            <div class="model-buttons">
                <button class="btn-primary" onclick="InsertTransaction()">Add</button>
                <button onclick="closeAllModels()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Update Transaction Model  -->
    <div id="update-transaction-model" class="model" style="display:none;">
        <div class="model-box">
            <h3>Update Transaction</h3>
            <input type="hidden" id="update-transaction-number">
            <input type="text"   id="update-transaction-name"   placeholder="Name">
            <input type="number" id="update-transaction-amount" placeholder="Amount" step="0.01">
            <select id="update-transaction-category-options">
                <option value="Food">Food</option>
                <option value="Transportation">Transportation</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Utilities">Utilities</option>
                <option value="Groceries">Groceries</option>
            </select>
            <input type="date" id="update-transaction-date">
            <div class="model-buttons">
                <button class="btn-primary" onclick="EditTransaction()">Save</button>
                <button onclick="closeAllModels()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Add Budget Model -->
    <div id="add-budget-model" class="model" style="display:none;">
        <div class="model-box">
            <h3>Add Budget</h3>
            <select id="add-budget-category-options">
                <option value="">-- Category --</option>
                <option value="Food">Food</option>
                <option value="Transportation">Transportation</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Utilities">Utilities</option>
                <option value="Groceries">Groceries</option>
            </select>
            <input type="number" id="add-budget-threshold" placeholder="Threshold" step="0.01">
            <select id="add-frequency-options">
                <option value="">-- Frequency --</option>
                <option value="Weekly">Weekly</option>
                <option value="Monthly">Monthly</option>
            </select>
            <div class="model-buttons">
                <button class="btn-primary" onclick="InsertBudget()">Add</button>
                <button onclick="closeAllModels()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Update Budget Model -->
    <div id="update-budget-model" class="model" style="display:none;">
        <div class="model-box">
            <h3>Update Budget</h3>
            <input type="hidden" id="update-budget-id">
            <select id="update-budget-category-options">
                <option value="Food">Food</option>
                <option value="Transportation">Transportation</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Utilities">Utilities</option>
                <option value="Groceries">Groceries</option>
            </select>
            <input type="number" id="update-budget-threshold" placeholder="Threshold" step="0.01">
            <div class="model-buttons">
                <button class="btn-primary" onclick="EditBudget()">Save</button>
                <button onclick="closeAllModels()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Change Name Model -->
    <div id="change-name-model" class="model" style="display:none;">
        <div class="model-box">
            <h3>Change Name</h3>
            <input type="text" id="new-user-name" placeholder="New Name">
            <div class="model-buttons">
                <button class="btn-primary" onclick="changeName()">Save</button>
                <button onclick="closeAllModels()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Change Password Model-->
    <div id="change-password-model" class="model" style="display:none;">
        <div class="model-box">
            <h3>Change Password</h3>
            <input type="password" id="new-password" placeholder="New Password">
            <div class="model-buttons">
                <button class="btn-primary" onclick="changePassword()">Save</button>
                <button onclick="closeAllModels()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="../Scripts/Models.js"></script>
    <script src="../Scripts/AccountPage.js"></script>
</body>
</html>
